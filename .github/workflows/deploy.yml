name: Deploy Astro Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping deploys
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Install dependencies
      - name: Install dependencies
        run: pnpm install

      # Create environment file
      - name: Create .env
        run: |
          echo "API_KEY=${{ secrets.API_KEY }}" >> .env

      # Build Astro
      - name: Build project
        run: pnpm build

      # Disable Jekyll completely
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      # Upload static files
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
